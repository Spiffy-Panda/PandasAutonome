name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore AutonomeSimulator/AutonomeSimulator.sln

      - name: Build
        run: dotnet build AutonomeSimulator/AutonomeSimulator.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test AutonomeSimulator/AutonomeSimulator.sln --no-build --configuration Release --verbosity normal
